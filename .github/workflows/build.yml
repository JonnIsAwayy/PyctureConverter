name: Build PyctureConverter

on:
  push:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python Libraries
      run: |
        python -m pip install --upgrade pip
        pip install scikit-build "cmake<4.0.0" ninja
        pip install --no-build-isolation -r requirements.txt
        pip install pyinstaller

    - name: Build EXE
      run: pyinstaller --name PyctureConverter-Windows --noconsole --onefile --add-data "assets;assets" src/main.py

    - name: Upload Finished App
      uses: actions/upload-artifact@v4
      with:
        name: PyctureConverter-Windows
        path: dist/*

  build-macos:
    runs-on: macos-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Mac Dependencies
      run: brew install pkg-config tcl-tk

    - name: Install Python Libraries
      run: |
        python -m pip install --upgrade pip
        pip install scikit-build "cmake<4.0.0" ninja
        export PATH="$(python -c 'import sys; print(sys.prefix)')/bin:$PATH"
        pip install --no-build-isolation -r requirements.txt
        pip install pyinstaller

    - name: Build App
      run: pyinstaller --name PyctureConverter-macOS --noconsole --onefile --add-data "assets:assets" src/main.py

    - name: Upload Finished App
      uses: actions/upload-artifact@v4
      with:
        name: PyctureConverter-macOS
        path: dist/*

  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Linux Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config tcl-dev tk-dev

    - name: Install Python Libraries
      run: |
        python -m pip install --upgrade pip
        pip install scikit-build "cmake<4.0.0" ninja
        export PATH="$(python -c 'import sys; print(sys.prefix)')/bin:$PATH"
        pip install --no-build-isolation -r requirements.txt
        pip install pyinstaller

    - name: Build App
      run: pyinstaller --name PyctureConverter-Linux --noconsole --onefile --add-data "assets:assets" src/main.py

    - name: Upload Finished App
      uses: actions/upload-artifact@v4
      with:
        name: PyctureConverter-Linux
        path: dist/*